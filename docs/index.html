    /* ─────────────────────────────────────────────
       SEEDED PRNG  (Mulberry32 — no deps needed)
    ───────────────────────────────────────────── */
    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function dateToSeed() {
      const d = new Date();
      return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    }

    function seededShuffle(arr, rand) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickActivities(age, shuffleCount) {
      const seed = dateToSeed() + shuffleCount * 999983;
      const rand = mulberry32(seed);
      return ['morning', 'afterschool', 'bedtime'].map(slot => {
        const pool = ACTIVITIES.filter(a => a.slot === slot && age >= a.ageMin && age <= a.ageMax);
        return seededShuffle(pool, rand)[0] || null;
      });
    }

    /* ─────────────────────────────────────────────
       STREAK  (localStorage)
    ───────────────────────────────────────────── */
    const STREAK_KEY = 'lld_streak_v1';

    function todayStr() { return new Date().toISOString().slice(0, 10); }
    function yesterdayStr() { return new Date(Date.now() - 86400000).toISOString().slice(0, 10); }

    function loadStreak() {
      try {
        const raw = localStorage.getItem(STREAK_KEY);
        if (!raw) return { lastDate: null, current: 0, longest: 0, doneToday: [] };
        const d = JSON.parse(raw);
        const today = todayStr(), yesterday = yesterdayStr();
        if (d.lastDate !== today && d.lastDate !== yesterday) { d.current = 0; d.doneToday = []; }
        else if (d.lastDate === yesterday) { d.doneToday = []; }
        return d;
      } catch { return { lastDate: null, current: 0, longest: 0, doneToday: [] }; }
    }

    function saveStreak(d) {
      try { localStorage.setItem(STREAK_KEY, JSON.stringify(d)); } catch {}
    }

       SLOT CONFIG
    ───────────────────────────────────────────── */

          </div>
        </div>
      );
    }

      const [streak, setStreak]         = useState(() => loadStreak());

        setCards(pickActivities(a, sc));
        setGenerated(true);
        setDone({ morning: false, afterschool: false, bedtime: false });
      }, []);

      const handleGenerate = () => generate(age, shuffleCount);
      const handleShuffle = () => { const sc = shuffleCount + 1; setShuffle(sc); generate(age, sc); };
      const handleAge = (a) => { setAge(a); if (generated) generate(a, shuffleCount); };

      const handleDone = (slot) => {
        const next = { ...done, [slot]: true };
        setDone(next);
        if (SLOTS.every(s => next[s])) {
          setStreak(prev => {
            const today = todayStr(), yest = yesterdayStr();
            const newCurrent = prev.lastDate === yest ? prev.current + 1 : (prev.lastDate === today ? prev.current : 1);
            const updated = { ...prev, lastDate: today, current: newCurrent, longest: Math.max(prev.longest, newCurrent), doneToday: SLOTS };
            saveStreak(updated);
            return updated;
          });
        }

          {!generated && (
            <div className="no-print" style={{ textAlign: 'center', padding: '3rem 1rem' }}>
              <div style={{ fontSize: '5rem', marginBottom: '1rem' }}>🧭</div>
              <p style={{ fontSize: '1.5rem', fontWeight: 900, color: '#374151', marginBottom: '0.5rem' }}>Ready for your adventure?</p>
              <p style={{ color: '#9ca3af', fontWeight: 600 }}>Pick your age above and hit the button to get started!</p>
            </div>
          )}

          {/* ── Cards ── */}
          {generated && (
            <div className="card-grid" style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 1rem', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '1.5rem' }}>
              {SLOTS.map((slot, i) => (
                <ActivityCard key={slot} activity={cards[i]} slot={slot} showNote={showNote} done={done[slot]} onDone={() => handleDone(slot)} print={false} />
              ))}
            </div>
          )}

          {/* ── Print button ── */}
          {generated && (
            <div className="no-print" style={{ textAlign: 'center', marginTop: '2rem' }}>
              <button
                onClick={() => window.print()}
                style={{ padding: '0.75rem 1.5rem', borderRadius: '999px', fontWeight: 700, fontSize: '0.9rem', background: 'white', color: '#6b7280', border: '2px solid #e5e7eb', cursor: 'pointer', fontFamily: 'inherit', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', transition: 'transform 0.15s' }}
                onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.04)'; }}
                onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
              >
                🖨️ Print for the fridge
              </button>

              {streak.longest >= 2 && (
                <p style={{ marginTop: '1rem', color: '#9ca3af', fontSize: '0.85rem', fontWeight: 600 }}>
                  🏆 Longest streak: {streak.longest} days
                </p>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
